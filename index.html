<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Texas VA Homebuyer Advisor</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      margin: 0;
      padding: 24px 16px;
      color: #1f2937;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    .header {
      background: #0f172a;
      color: white;
      padding: 24px;
    }

    .header h1 {
      margin: 0 0 8px;
      font-size: 30px;
      line-height: 1.2;
    }

    .header p {
      margin: 0;
      line-height: 1.5;
      opacity: 0.95;
      font-size: 15px;
    }

    .subheader {
      padding: 16px 20px;
      background: #eef2ff;
      border-bottom: 1px solid #e5e7eb;
    }

    .subheader p {
      margin: 0 0 12px;
      font-size: 15px;
      line-height: 1.5;
      font-weight: 500;
    }

    .top-cta-buttons,
    .starter-buttons,
    .form-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 14px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    button:hover {
      opacity: 0.92;
    }

    .primary-btn {
      background: #0f172a;
      color: white;
    }

    .secondary-btn {
      background: #dbeafe;
      color: #0f172a;
    }

    .starter-buttons {
      padding: 16px 20px 0;
      background: white;
    }

    .starter-buttons button {
      background: #e2e8f0;
      color: #0f172a;
      font-size: 14px;
    }

    .chat-box {
      height: 430px;
      overflow-y: auto;
      padding: 20px;
      background: #f8fafc;
      border-top: 1px solid #e5e7eb;
      border-bottom: 1px solid #e5e7eb;
    }

    .message {
      margin-bottom: 16px;
      padding: 12px 14px;
      border-radius: 12px;
      max-width: 85%;
      line-height: 1.5;
      white-space: pre-wrap;
      font-size: 14px;
    }

    .user {
      background: #dbeafe;
      margin-left: auto;
    }

    .bot {
      background: #e5e7eb;
      margin-right: auto;
    }

    .input-area {
      display: flex;
      gap: 10px;
      padding: 18px 20px;
      background: white;
    }

    .input-area input {
      flex: 1;
      padding: 14px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      font-size: 16px;
    }

    .lead-form-wrap {
      display: none;
      padding: 20px;
      background: #ffffff;
      border-top: 1px solid #e5e7eb;
    }

    .lead-form-wrap.active {
      display: block;
    }

    .lead-form-wrap h3 {
      margin: 0 0 8px;
      font-size: 22px;
    }

    .lead-form-wrap p {
      margin: 0 0 16px;
      line-height: 1.5;
      font-size: 14px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .form-grid .full {
      grid-column: 1 / -1;
    }

    .lead-form-wrap input {
      width: 100%;
      box-sizing: border-box;
      padding: 14px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      font-size: 15px;
    }

    .form-actions {
      margin-top: 14px;
    }

    .success-message,
    .error-message {
      margin-top: 14px;
      font-size: 14px;
      line-height: 1.5;
    }

    .success-message {
      color: #166534;
    }

    .error-message {
      color: #b91c1c;
    }

    .disclosure {
      padding: 14px 20px 20px;
      font-size: 12px;
      line-height: 1.5;
      color: #475569;
      background: #ffffff;
    }

    @media (max-width: 640px) {
      body {
        padding: 12px;
      }

      .header h1 {
        font-size: 24px;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      .message {
        max-width: 92%;
      }

      .input-area {
        flex-direction: column;
      }

      .input-area button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Texas VA Homebuyer Advisor</h1>
      <p>
        Get quick answers about VA home loans, eligibility, affordability, funding fees, and next steps for buying
